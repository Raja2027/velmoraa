version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: velmoraa_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: velmoraa
    ports:
      - "54321:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
